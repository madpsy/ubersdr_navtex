services:
  ubersdr_navtex:
    container_name: navtex
    image: madpsy/ubersdr_navtex:latest
    restart: unless-stopped
    environment:
      # UberSDR base URL
      UBERSDR_URL: "http://ubersdr:8080"
      # NAVTEX carrier frequency in Hz (518000 = international, 490000 = UK/coastal)
      NAVTEX_FREQ: "518000"
      # Uncomment and set as needed:
      # WEB_PORT: "6092"
    networks:
      - sdr-network

networks:
  sdr-network:
    external: true
    name: ubersdr_sdr-network
