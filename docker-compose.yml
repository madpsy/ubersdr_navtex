services:
  ubersdr_navtex:
    container_name: navtex
    image: madpsy/ubersdr_navtex:latest
    restart: unless-stopped
    environment:
      # UberSDR base URL
      UBERSDR_URL: "http://ubersdr:8080"
      # NAVTEX carrier frequencies in Hz — both are always monitored simultaneously
      NAVTEX_FREQ_1: "518000"   # International NAVTEX (English, worldwide)
      NAVTEX_FREQ_2: "490000"   # National NAVTEX (regional/coastal)
      # Save decoded messages to disk (set to "" to disable)
      NAVTEX_LOG_DIR: "/data/navtex_logs"
      # Delete log files older than this many days (0 = keep forever)
      NAVTEX_LOG_RETAIN_DAYS: "30"
      # Uncomment and set as needed:
      # WEB_PORT: "6092"
      # UI_PASSWORD: ""   # Set a password to enable write actions in the web UI.
                          # Leave empty (default) to disable all write actions.
    volumes:
      - ./navtex_logs:/data/navtex_logs
    networks:
      - sdr-network
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "127.0.0.1:24224"
        fluentd-async: "true"
        tag: "navtex"

networks:
  sdr-network:
    external: true
    name: ubersdr_sdr-network
